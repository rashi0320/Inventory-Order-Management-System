version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ethara-postgres-db-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_pass
      POSTGRES_DB: inventory_db_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethara-backend-api-dev
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_pass@db:5432/inventory_db_dev
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: ethara-frontend-web-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_dev_data:
