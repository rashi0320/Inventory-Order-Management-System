server {
    listen 3000;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy routes to the FastAPI backend service running on port 8080
    location ~ ^/(products|customers|orders|dashboard|seed) {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy docs and OpenAPI json for API documentation
    location /docs {
        proxy_pass http://backend:8080/docs;
    }

    location /openapi.json {
        proxy_pass http://backend:8080/openapi.json;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
